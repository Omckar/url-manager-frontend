<div class="d-flex align-items-center justify-content-center min-vh-100 px-3 py-5">
  <div class="card card-premium shadow border-0 p-4 p-md-5 w-100" style="max-width: 480px; background: rgba(255, 255, 255, 0.95);">
    <div class="text-center mb-4">
      <div class="d-inline-flex align-items-center justify-content-center bg-primary bg-gradient rounded-3 text-white mb-3" style="width: 50px; height: 50px; background: var(--primary-gradient) !important;">
        <i class="bi bi-link-45deg fs-2"></i>
      </div>
      <h2 class="h3 fw-bold text-dark mb-1">Welcome Back</h2>
      <p class="text-muted">Enter your details to access your dashboard</p>
    </div>

    <div *ngIf="errorMessage" class="alert alert-danger d-flex align-items-center gap-2 border-0 rounded-3" role="alert">
      <i class="bi bi-exclamation-triangle-fill fs-5"></i>
      <div>{{ errorMessage }}</div>
    </div>

    <form [formGroup]="loginForm" (ngSubmit)="onSubmit()">
      <!-- Email Field -->
      <div class="mb-3">
        <label for="email" class="form-label text-secondary fw-semibold" style="font-size: 0.85rem;">Email Address</label>
        <div class="input-group">
          <span class="input-group-text bg-white border-end-0 border-light"><i class="bi bi-envelope text-muted"></i></span>
          <input type="email" id="email" formControlName="email" class="form-control form-control-premium border-start-0 ps-1" placeholder="name@company.com" [class.is-invalid]="loginForm.get('email')?.touched && loginForm.get('email')?.invalid">
        </div>
        <div *ngIf="loginForm.get('email')?.touched && loginForm.get('email')?.invalid" class="text-danger mt-1" style="font-size: 0.8rem;">
          <span *ngIf="loginForm.get('email')?.errors?.['required']">Email is required.</span>
          <span *ngIf="loginForm.get('email')?.errors?.['email']">Please provide a valid email.</span>
        </div>
      </div>

      <!-- Password Field -->
      <div class="mb-4">
        <label for="password" class="form-label text-secondary fw-semibold" style="font-size: 0.85rem;">Password</label>
        <div class="input-group">
          <span class="input-group-text bg-white border-end-0 border-light"><i class="bi bi-lock text-muted"></i></span>
          <input type="password" id="password" formControlName="password" class="form-control form-control-premium border-start-0 ps-1" placeholder="••••••••" [class.is-invalid]="loginForm.get('password')?.touched && loginForm.get('password')?.invalid">
        </div>
        <div *ngIf="loginForm.get('password')?.touched && loginForm.get('password')?.invalid" class="text-danger mt-1" style="font-size: 0.8rem;">
          <span *ngIf="loginForm.get('password')?.errors?.['required']">Password is required.</span>
          <span *ngIf="loginForm.get('password')?.errors?.['minlength']">Password must be at least 6 characters.</span>
        </div>
      </div>

      <!-- Submit Button -->
      <button type="submit" [disabled]="isLoading" class="btn btn-gradient w-100 py-2 fs-6 rounded-3 d-flex align-items-center justify-content-center gap-2">
        <span *ngIf="isLoading" class="spinner-border spinner-border-sm" role="status" aria-hidden="true"></span>
        <span>{{ isLoading ? 'Signing In...' : 'Sign In' }}</span>
      </button>
    </form>

    <div class="text-center mt-4">
      <p class="text-muted mb-0" style="font-size: 0.9rem;">
        Don't have an account? 
        <a routerLink="/auth/register" class="text-primary fw-semibold text-decoration-none">Create account</a>
      </p>
    </div>
  </div>
</div>
